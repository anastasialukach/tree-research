<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  .card {
    width: 1200px;
    height: 675px;
    background: #0d0d0f;
    border-radius: 20px;
    border: 1px solid #1e1e24;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 40px 0 40px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #55555a;
    letter-spacing: 0.5px;
  }
  .logo span { color: #4ecb71; }

  .tag {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #55555a;
    background: #141416;
    border: 1px solid #1e1e24;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .headline {
    padding: 12px 40px 0 40px;
  }

  .headline h1 {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: #f5f5f7;
    line-height: 1.15;
  }

  .headline h1 .green { color: #22c55e; }
  .headline h1 .dim { color: #3a3a40; }

  .headline p {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #55555a;
    margin-top: 4px;
  }

  /* Tree area */
  .tree-area {
    flex: 1;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tree-area svg {
    display: block;
  }

  /* Bottom */
  .bottom {
    background: #141416;
    border-top: 1px solid #1e1e24;
    padding: 12px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .bottom .punch {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #88888d;
    font-weight: 500;
  }
  .bottom .punch strong { color: #f0f0f3; font-weight: 700; }

  .bottom .install {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #0d0d0f;
    background: #22c55e;
    padding: 6px 16px;
    border-radius: 6px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="card">
  <div class="topbar">
    <div class="logo"><span>tree</span>-research</div>
    <div class="tag">one branch, four levels deep</div>
  </div>

  <div class="headline">
    <h1>How <span class="green">one seed</span> becomes <span class="green">30 leads</span></h1>
    <p>Invest Like the Best → Colossus network → Capital Allocators gap → MENA sovereign wealth opportunity</p>
  </div>

  <div class="tree-area">
    <svg width="1120" height="430" viewBox="0 0 1120 430" xmlns="http://www.w3.org/2000/svg">
      <!-- Edges (bezier curves) -->
      <!-- L0 → L1 branches -->
      <path d="M560,50 C560,90 200,80 200,120" stroke="#4ade8055" stroke-width="2" fill="none"/>
      <path d="M560,50 C560,90 560,80 560,120" stroke="#4ade8055" stroke-width="2" fill="none"/>
      <path d="M560,50 C560,90 920,80 920,120" stroke="#4ade8055" stroke-width="2" fill="none"/>

      <!-- L1 → L2 (Capital Allocators path highlighted) -->
      <path d="M200,152 C200,192 340,180 340,220" stroke="#fbbf2455" stroke-width="2" fill="none"/>
      <path d="M560,152 C560,192 560,180 560,220" stroke="#fbbf2455" stroke-width="2" fill="none"/>
      <path d="M920,152 C920,192 780,180 780,220" stroke="#fbbf2455" stroke-width="2" fill="none"/>

      <!-- L2 → L3 -->
      <path d="M340,252 C340,292 220,280 220,315" stroke="#c4b5fd44" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
      <path d="M340,252 C340,292 440,280 440,315" stroke="#c4b5fd44" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
      <path d="M560,252 C560,292 660,280 660,315" stroke="#c4b5fd44" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
      <path d="M780,252 C780,292 880,280 880,315" stroke="#c4b5fd44" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

      <!-- LEVEL LABELS (left side) -->
      <text x="30" y="42" fill="#4ade80" font-size="10" font-weight="700" font-family="JetBrains Mono" letter-spacing="1">L0</text>
      <text x="30" y="52" fill="#4ade8088" font-size="9" font-family="Inter" font-weight="500">SEED</text>

      <text x="30" y="138" fill="#4ade80" font-size="10" font-weight="700" font-family="JetBrains Mono" letter-spacing="1">L1</text>
      <text x="30" y="148" fill="#4ade8088" font-size="9" font-family="Inter" font-weight="500">MAP</text>

      <text x="30" y="238" fill="#fbbf24" font-size="10" font-weight="700" font-family="JetBrains Mono" letter-spacing="1">L2</text>
      <text x="30" y="248" fill="#fbbf2488" font-size="9" font-family="Inter" font-weight="500">DEEP</text>

      <text x="30" y="332" fill="#c4b5fd" font-size="10" font-weight="700" font-family="JetBrains Mono" letter-spacing="1">L3</text>
      <text x="30" y="342" fill="#c4b5fd88" font-size="9" font-family="Inter" font-weight="500">NEXT</text>

      <!-- L0: Seed -->
      <rect x="430" y="24" width="260" height="40" rx="10" fill="#4ade8015" stroke="#4ade8044" stroke-width="1.5"/>
      <text x="560" y="49" fill="#4ade80" font-size="14" font-weight="700" font-family="Inter" text-anchor="middle">Invest Like the Best</text>
      <text x="674" y="46" fill="#4ade8066" font-size="9" font-family="JetBrains Mono">564 eps</text>

      <!-- L1: Map (3 key branches found) -->
      <rect x="80" y="120" width="240" height="40" rx="10" fill="#4ade8012" stroke="#4ade8033" stroke-width="1"/>
      <text x="200" y="143" fill="#4ade80" font-size="12" font-weight="600" font-family="Inter" text-anchor="middle">Colossus Network</text>
      <text x="306" y="140" fill="#4ade8066" font-size="9" font-family="JetBrains Mono">7 shows</text>

      <rect x="440" y="120" width="240" height="40" rx="10" fill="#4ade8012" stroke="#4ade8033" stroke-width="1"/>
      <text x="560" y="143" fill="#4ade80" font-size="12" font-weight="600" font-family="Inter" text-anchor="middle">12 Branch-Worthy Guests</text>

      <rect x="800" y="120" width="240" height="40" rx="10" fill="#4ade8012" stroke="#4ade8033" stroke-width="1"/>
      <text x="920" y="143" fill="#4ade80" font-size="12" font-weight="600" font-family="Inter" text-anchor="middle">Media-to-Fund Pipeline</text>

      <!-- L2: Deep Dives -->
      <rect x="210" y="218" width="260" height="44" rx="10" fill="#fbbf2412" stroke="#fbbf2433" stroke-width="1"/>
      <text x="340" y="237" fill="#fbbf24" font-size="12" font-weight="700" font-family="Inter" text-anchor="middle">Capital Allocators</text>
      <text x="340" y="253" fill="#fbbf2488" font-size="10" font-family="Inter" text-anchor="middle">791 eps, 0 MENA sovereign wealth</text>

      <rect x="510" y="218" width="210" height="44" rx="10" fill="#fbbf2412" stroke="#fbbf2433" stroke-width="1"/>
      <text x="615" y="237" fill="#fbbf24" font-size="12" font-weight="600" font-family="Inter" text-anchor="middle">Stratechery Model</text>
      <text x="615" y="253" fill="#fbbf2488" font-size="10" font-family="Inter" text-anchor="middle">paid newsletter + podcast</text>

      <rect x="730" y="218" width="210" height="44" rx="10" fill="#fbbf2412" stroke="#fbbf2433" stroke-width="1"/>
      <text x="835" y="237" fill="#fbbf24" font-size="12" font-weight="600" font-family="Inter" text-anchor="middle">20VC Comparison</text>
      <text x="835" y="253" fill="#fbbf2488" font-size="10" font-family="Inter" text-anchor="middle">$400M podcast → fund</text>

      <!-- L3: Future seeds (dashed borders) -->
      <rect x="110" y="312" width="220" height="36" rx="8" fill="#c4b5fd08" stroke="#c4b5fd33" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="220" y="334" fill="#c4b5fd99" font-size="11" font-weight="500" font-family="Inter" text-anchor="middle">MENA SWF coverage gap</text>

      <rect x="340" y="312" width="200" height="36" rx="8" fill="#c4b5fd08" stroke="#c4b5fd33" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="440" y="334" fill="#c4b5fd99" font-size="11" font-weight="500" font-family="Inter" text-anchor="middle">Ted Seides as guest</text>

      <rect x="555" y="312" width="220" height="36" rx="8" fill="#c4b5fd08" stroke="#c4b5fd33" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="665" y="334" fill="#c4b5fd99" font-size="11" font-weight="500" font-family="Inter" text-anchor="middle">Print magazine economics</text>

      <rect x="790" y="312" width="220" height="36" rx="8" fill="#c4b5fd08" stroke="#c4b5fd33" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="900" y="334" fill="#c4b5fd99" font-size="11" font-weight="500" font-family="Inter" text-anchor="middle">Podcast-to-fund pipeline</text>

      <!-- Highlight callout — the key insight -->
      <rect x="160" y="370" width="380" height="50" rx="10" fill="#ef444412" stroke="#ef444444" stroke-width="1"/>
      <text x="180" y="392" fill="#ef4444" font-size="10" font-weight="700" font-family="JetBrains Mono" letter-spacing="0.5">KEY INSIGHT</text>
      <text x="180" y="408" fill="#ef444499" font-size="11.5" font-weight="500" font-family="Inter">791 episodes. Zero MENA sovereign wealth.</text>

      <!-- Arrow from callout to the L2 node -->
      <path d="M340,370 L340,264" stroke="#ef444444" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#ef444444"/>
        </marker>
      </defs>

      <!-- Stats at bottom right -->
      <text x="820" y="386" fill="#44444a" font-size="10" font-weight="600" font-family="JetBrains Mono" letter-spacing="0.5">FROM ONE SEED:</text>
      <text x="820" y="404" fill="#77777c" font-size="11" font-family="Inter"><tspan fill="#4ade80" font-weight="700">12</tspan> guests mapped</text>
      <text x="820" y="420" fill="#77777c" font-size="11" font-family="Inter"><tspan fill="#fbbf24" font-weight="700">7</tspan> shows discovered</text>
      <text x="960" y="404" fill="#77777c" font-size="11" font-family="Inter"><tspan fill="#ef4444" font-weight="700">1</tspan> massive gap found</text>
      <text x="960" y="420" fill="#77777c" font-size="11" font-family="Inter"><tspan fill="#c4b5fd" font-weight="700">4</tspan> L3 seeds spawned</text>
    </svg>
  </div>

  <div class="bottom">
    <span class="punch"><strong>Each level's output decides the next level's input.</strong> The data leads, not a preset agenda.</span>
    <span class="install">npx tree-research init</span>
  </div>
</div>
</body>
</html>
